# Tracing & Observation Defaults (Spring Boot 4.0 Standard)
management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0

# Propagation: Modern W3C standard (default) + B3 for legacy
management.tracing.propagation.type=w3c,b3

# MDC Correlation (Automatic in Spring Boot 3+)
management.tracing.baggage.enabled=true
management.tracing.baggage.correlation.fields=userId
management.tracing.baggage.remote-fields=userId

# Fix Prometheus tag conflict
management.metrics.enable.http.server.requests=false

# Disable OTLP exports by default (prevents errors when collector is missing)
management.otlp.metrics.export.enabled=false
management.tracing.export.otlp.enabled=false
