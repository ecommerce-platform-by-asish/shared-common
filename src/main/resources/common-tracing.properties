# Tracing & Observation Defaults (Always-on)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Property to force OTel SDK to start even without a real exporter
# This is necessary for local development to get Trace IDs in logs and headers.
otel.sdk.disabled=false
otel.traces.exporter=none

# Propagation: Modern W3C standard (default) + B3 for legacy
management.tracing.propagation.produce=w3c,b3
management.tracing.propagation.consume=w3c,b3

# MDC Correlation (Automatic in Spring Boot 3+)
management.tracing.baggage.enabled=true
management.tracing.baggage.correlation.fields=userId
management.tracing.baggage.remote-fields=userId

# Ensure observations are enabled via annotations
management.observations.annotations.enabled=true

